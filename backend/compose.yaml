services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: myexpressionfriend-postgres
    environment:
      POSTGRES_DB: MyExpressionFriend
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    ports:
      - "5433:5432"
    volumes:
      - myexpressionfriend_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  myexpressionfriend_postgres_data:
