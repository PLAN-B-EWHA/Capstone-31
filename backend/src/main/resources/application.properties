# Application Name
spring.application.name=myexpressionfriend-api

# Server Port
server.port=${PORT:8080}

# Active Profile
spring.profiles.active=${SPRING_PROFILE:dev}

# Database Driver
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/MyExpressionFriend}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:change-me}

# JWT
jwt.access-token-expire-minutes=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:1440}
jwt.refresh-token-expire-minutes=${JWT_REFRESH_TOKEN_EXPIRE_MINUTES:10080}
jwt.secret=${JWT_SECRET:change-me}

jwt.cookie.name=${JWT_COOKIE_NAME:refreshToken}
jwt.cookie.max-age=${JWT_COOKIE_MAX_AGE:604800}
jwt.cookie.path=${JWT_COOKIE_PATH:/}
jwt.cookie.secure=${JWT_COOKIE_SECURE:true}
jwt.cookie.http-only=${JWT_COOKIE_HTTP_ONLY:true}
jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE=None}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-with-zone-id=false

# File Upload
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:120MB}


# CORS
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173}
app.storage.base-path=${APP_STORAGE_BASE_PATH:uploads}
app.scenario.backup-dir=${APP_SCENARIO_BACKUP_DIR:uploads/exports/scenarios}

# Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
swagger.server-url=${SWAGGER_SERVER_URL:}

management.endpoints.web.exposure.include=health

# Cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=3600s

# Redis 캐시 연결 설정
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Flyway 의 설정
spring.flyway.enabled=${FLYWAY_ENABLED:false}

spring.flyway.locations=classpath:db/migration

# 로깅 및 디버그 레벨 설정
logging.level.org.springframework.security=INFO
logging.level.com.planB.myexpressionfriend=INFO

# Statistics settings
statistics.recommended-per-week=3
statistics.session-duration.min-sec=30
statistics.session-duration.expression-max-sec=300
statistics.error-pattern.cron=0 0 3 * * MON

llm.enabled=false
llm.base-url=http://localhost:11434
llm.api-key=
llm.model-flash=gemini-3-flash-preview
llm.model-pro=gemini-3-pro-preview
# Ollama-compatible /api/generate think option: true, false, low, medium, high, or blank for provider default.
llm.think=
llm.max-retries=5
llm.max-backoff-seconds=64
llm.max-zero-score-turns-per-child=150
llm.manual-refresh-cooldown-hours=24

# OpenAI Realtime
# Server creates short-lived client secrets for Unity/.NET clients after JWT authentication.
openai.realtime.enabled=${OPENAI_REALTIME_ENABLED:false}
openai.realtime.base-url=${OPENAI_REALTIME_BASE_URL:https://api.openai.com}
openai.realtime.api-key=${OPENAI_API_KEY:}
openai.realtime.model=${OPENAI_REALTIME_MODEL:gpt-realtime}
openai.realtime.voice=${OPENAI_REALTIME_VOICE:marin}
openai.realtime.modalities=${OPENAI_REALTIME_MODALITIES:text}
openai.realtime.instructions=${OPENAI_REALTIME_INSTRUCTIONS:You are a friendly game companion for a child social-expression practice game.}

# Spring AI / RAG
# Chat generation stays on the existing llm.* client.
# Spring AI is used only for Ollama embeddings and pgvector storage/search.
spring.ai.model.chat=${SPRING_AI_CHAT_MODEL:none}
spring.ai.model.embedding=${SPRING_AI_EMBEDDING_MODEL:ollama}
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.embedding.options.model=${OLLAMA_EMBEDDING_MODEL:qwen3-embedding}
spring.ai.vectorstore.pgvector.initialize-schema=${SPRING_AI_PGVECTOR_INITIALIZE_SCHEMA:false}
spring.ai.vectorstore.pgvector.index-type=${SPRING_AI_PGVECTOR_INDEX_TYPE:NONE}
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.dimensions=${SPRING_AI_PGVECTOR_DIMENSIONS:4096}
spring.ai.vectorstore.pgvector.max-document-batch-size=1000

# Expression Baseline Duration (ms) per emotion
expression.baseline-duration-ms.happy=4000
expression.baseline-duration-ms.sad=5500
expression.baseline-duration-ms.angry=6000
expression.baseline-duration-ms.disgust=6000
expression.baseline-duration-ms.surprise=6500
expression.baseline-duration-ms.fear=7000
